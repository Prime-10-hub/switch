<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switch</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- ANNOUNCEMENT BAR -->
    <div class="announcement-bar">
        <!-- Left Arrow -->
        <button class="ann-arrow" id="ann-prev">&#8249;</button>

        <!-- Messages Window -->
        <div class="ann-window">

            <!-- Messages Track — this is what slides -->
            <div class="ann-track">
                <p class="ann-message">
                    🔥 Free Delivery on Orders Above UGX 200,000
                </p>
                <p class="ann-message">
                    🎓 15% Off for All Students on Subscription
                </p>
                <p class="ann-message">
                    🎉 3 Months Free for First Time Users — Cancel Anytime
                </p>
            </div>

        </div>

        <!-- Right Arrow -->
        <button class="ann-arrow" id="ann-next">&#8250;</button>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
